<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · AI Construction Site Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    :root {
      --bg: linear-gradient(160deg, #07162a 0%, #0d1f38 55%, #06202c 100%);
      --panel: rgba(255, 255, 255, 0.35);
      --panel-border: rgba(255, 255, 255, 0.45);
      --ink: #0f172a;
      --muted: rgba(15, 23, 42, 0.72);
      --accent: #1b7a58;
      --accent-deep: #134d39;
      --panel-radius: 20px;
      --safe: #1d8c62;
      --warn: #f0a44c;
      --danger: #ef4444;
      --glow: rgba(94, 173, 255, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow: hidden;
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .leaflet-container {
      filter: saturate(1.08) brightness(1.04) contrast(1.22) hue-rotate(-6deg) drop-shadow(0 0 0 rgba(0,0,0,0));
      transition: filter 0.6s ease;
    }

    .overlay-glow {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 60% 22%, rgba(138, 196, 240, 0.22), transparent 52%),
        radial-gradient(circle at 28% 80%, rgba(64, 173, 150, 0.15), transparent 55%),
        linear-gradient(180deg, rgba(10, 28, 43, 0.12), rgba(6, 20, 30, 0.28));
      filter: blur(0.5px);
      mix-blend-mode: soft-light;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 55%, rgba(3, 9, 18, 0.65) 110%);
      mix-blend-mode: multiply;
    }

    .route-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .route-path {
      fill: none;
      stroke: rgba(162, 213, 255, 0.78);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 4 8;
      filter: drop-shadow(0 0 12px rgba(35, 110, 168, 0.55));
      animation: routePulse 2.2s linear infinite;
    }

    .route-traveler {
      fill: rgba(195, 231, 255, 0.95);
      filter: drop-shadow(0 0 12px rgba(120, 195, 255, 0.9));
    }

    @keyframes routePulse {
      0% { stroke-dashoffset: 0; opacity: 0.4; }
      50% { opacity: 1; }
      100% { stroke-dashoffset: -48; opacity: 0.4; }
    }

    .ui-shell {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
      pointer-events: none;
    }

    .login-card {
      pointer-events: auto;
    }

    @media (max-width: 980px) {
      .ui-shell {
        padding: 24px;
        justify-content: center;
      }
    }

    .login-card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--panel-radius);
      padding: 36px;
      box-shadow: 0 25px 55px rgba(6, 16, 30, 0.4);
      backdrop-filter: blur(16px);
      max-width: 420px;
      width: 100%;
      color: var(--ink);
    }

    .login-card h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 1px;
      color: var(--accent);
      font-weight: 600;
      font-family: "Poppins", "Inter", sans-serif;
    }

    .login-card p {
      margin: 0 0 16px;
      color: rgba(15, 23, 42, 0.6);
      font-size: 15px;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(15, 23, 42, 0.65);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 16px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      margin-bottom: 16px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--ink);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 3px rgba(15, 23, 42, 0.08);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    select {
      font-family: "Inter", "Poppins", sans-serif;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      backdrop-filter: blur(12px);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    input::placeholder {
      color: rgba(15, 23, 42, 0.5);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: rgba(31, 138, 99, 0.5);
      box-shadow: 0 0 0 2px rgba(31, 138, 99, 0.2);
    }

    button {
      width: 100%;
      padding: 13px 16px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #176348, #1f7c5a);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 18px 36px rgba(15, 70, 52, 0.38);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
    }

    button:hover {
      filter: brightness(0.97);
      box-shadow: 0 18px 30px rgba(20, 90, 64, 0.5);
      transform: translateY(-1px);
      background: linear-gradient(135deg, #134b36, #166348);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 13px;
      color: rgba(15, 23, 42, 0.58);
    }

    .meta a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      color: var(--accent-deep);
    }

    .lang {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: rgba(15, 23, 42, 0.65);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="map" aria-hidden="true"></div>
  <div class="overlay-glow"></div>
  <div class="vignette"></div>
  <svg class="route-layer" id="routeLayer" viewBox="0 0 1000 600" preserveAspectRatio="none"></svg>

  <div class="ui-shell">
    <div class="login-card">
      <div class="lang">
        <span data-i18n="language">Language</span>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="ta">Tamil</option>
        </select>
      </div>
      <h1 data-i18n="loginTitle">Secure Sign In</h1>
      <p data-i18n="loginSubtitle">Access the AI construction site selection dashboard.</p>
      <label data-i18n="emailLabel">Email</label>
      <input id="email" type="email" placeholder="you@company.com" />
      <label data-i18n="passwordLabel">Password</label>
      <input id="password" type="password" placeholder="••••••••" />
      <button id="loginBtn" data-i18n="loginBtn">Login</button>
      <div class="meta">
        <span data-i18n="noAccount">No account?</span>
        <a href="/register" data-i18n="registerLink">Register</a>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map("map", {
      zoomControl: false,
      attributionControl: false,
      zoomSnap: 0.1,
      inertia: true
    }).setView([22.4, 78.7], 5);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    const routeLayer = document.getElementById("routeLayer");
    let lastPoint = map.latLngToContainerPoint(map.getCenter());

    function drawRoute(toPoint) {
      const svg = routeLayer;
      const width = svg.viewBox.baseVal.width || 1000;
      const height = svg.viewBox.baseVal.height || 600;
      const scaleX = width / window.innerWidth;
      const scaleY = height / window.innerHeight;
      const x1 = lastPoint.x * scaleX;
      const y1 = lastPoint.y * scaleY;
      const x2 = toPoint.x * scaleX;
      const y2 = toPoint.y * scaleY;
      const midX = (x1 + x2) / 2 + (Math.random() * 60 - 30);
      const midY = (y1 + y2) / 2 - 40;

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`);
      path.setAttribute("class", "route-path");
      svg.appendChild(path);

      const traveler = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      traveler.setAttribute("class", "route-traveler");
      traveler.setAttribute("r", "5");
      traveler.setAttribute("cx", `${x1}`);
      traveler.setAttribute("cy", `${y1}`);
      svg.appendChild(traveler);

      const duration = 2400;
      const start = performance.now();
      const animateTraveler = (now) => {
        const t = Math.min((now - start) / duration, 1);
        const inv = 1 - t;
        const x = inv * inv * x1 + 2 * inv * t * midX + t * t * x2;
        const y = inv * inv * y1 + 2 * inv * t * midY + t * t * y2;
        traveler.setAttribute("cx", `${x}`);
        traveler.setAttribute("cy", `${y}`);
        if (t < 1) {
          requestAnimationFrame(animateTraveler);
        } else {
          setTimeout(() => traveler.remove(), 300);
        }
      };
      requestAnimationFrame(animateTraveler);

      setTimeout(() => path.remove(), 6000);
      lastPoint = toPoint;
    }

    map.on("click", (e) => {
      const point = map.latLngToContainerPoint(e.latlng);
      drawRoute(point);
      map.flyTo(e.latlng, 8.5, { duration: 2.4 });
    });

    const translations = {
      en: {
        language: "Language",
        loginTitle: "Secure Sign In",
        loginSubtitle: "Access the AI construction site selection dashboard.",
        emailLabel: "Email",
        passwordLabel: "Password",
        loginBtn: "Login",
        noAccount: "No account?",
        registerLink: "Register",
        error: "Error"
      },
      hi: {
        language: "भाषा",
        loginTitle: "साइन इन",
        loginSubtitle: "एआई निर्माण स्थल चयन डैशबोर्ड तक पहुंचें।",
        emailLabel: "ईमेल",
        passwordLabel: "पासवर्ड",
        loginBtn: "लॉगिन",
        noAccount: "खाता नहीं है?",
        registerLink: "रजिस्टर",
        error: "त्रुटि"
      },
      ta: {
        language: "மொழி",
        loginTitle: "உள்நுழைவு",
        loginSubtitle: "AI கட்டுமான இடத் தேர்வு டாஷ்போர்டை அணுகவும்.",
        emailLabel: "மின்னஞ்சல்",
        passwordLabel: "கடவுச்சொல்",
        loginBtn: "உள்நுழைவு",
        noAccount: "கணக்கு இல்லையா?",
        registerLink: "பதிவு",
        error: "பிழை"
      }
    };

    const langSelect = document.getElementById("langSelect");
    const statusEl = document.getElementById("status");

    function applyTranslations(lang) {
      const dict = translations[lang] || translations.en;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[key]) {
          el.textContent = dict[key];
        }
      });
    }

    langSelect.addEventListener("change", (e) => applyTranslations(e.target.value));
    applyTranslations(langSelect.value);

    document.getElementById("loginBtn").addEventListener("click", async () => {
      statusEl.textContent = "";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) {
        statusEl.textContent = "Please enter email and password.";
        return;
      }
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = `${translations[langSelect.value]?.error || "Error"}: ${data.error || "Login failed"}`;
          return;
        }
        localStorage.setItem("jwt", data.access_token);
        window.location.href = "/";
      } catch (err) {
        statusEl.textContent = "Login failed.";
      }
    });
  </script>
</body>
</html>
