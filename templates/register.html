<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register · AI Construction Site Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f3ee;
      --ink: #1f1b16;
      --muted: #6b645c;
      --accent: #1f7a6b;
      --panel: #ffffff;
      --line: #e7dfd2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", Arial, sans-serif;
      background: radial-gradient(circle at top, #fff7ea 0%, #f1ece4 50%, #efe9de 100%);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      font-size: 12px;
    }

    .meta a { color: var(--accent); text-decoration: none; }

    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #8f3a1f;
    }

    .lang {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang">
      <span data-i18n="language">Language</span>
      <select id="langSelect">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
      </select>
    </div>
    <h1 data-i18n="registerTitle">Create account</h1>
    <p data-i18n="registerSubtitle">Register to access the assessment dashboard.</p>
    <label data-i18n="emailLabel">Email</label>
    <input id="email" type="email" placeholder="you@company.com" />
    <label data-i18n="passwordLabel">Password</label>
    <input id="password" type="password" placeholder="••••••••" />
    <button id="registerBtn" data-i18n="registerBtn">Register</button>
    <div class="meta">
      <span data-i18n="haveAccount">Already registered?</span>
      <a href="/login" data-i18n="loginLink">Login</a>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const translations = {
      en: {
        language: "Language",
        registerTitle: "Create account",
        registerSubtitle: "Register to access the assessment dashboard.",
        emailLabel: "Email",
        passwordLabel: "Password",
        registerBtn: "Register",
        haveAccount: "Already registered?",
        loginLink: "Login",
        error: "Error",
        success: "Registered"
      },
      hi: {
        language: "भाषा",
        registerTitle: "खाता बनाएं",
        registerSubtitle: "डैशबोर्ड तक पहुंच के लिए रजिस्टर करें।",
        emailLabel: "ईमेल",
        passwordLabel: "पासवर्ड",
        registerBtn: "रजिस्टर",
        haveAccount: "पहले से पंजीकृत?",
        loginLink: "लॉगिन",
        error: "त्रुटि",
        success: "रजिस्टर हुआ"
      },
      ta: {
        language: "மொழி",
        registerTitle: "கணக்கு உருவாக்கு",
        registerSubtitle: "டாஷ்போர்டை அணுக பதிவு செய்யவும்.",
        emailLabel: "மின்னஞ்சல்",
        passwordLabel: "கடவுச்சொல்",
        registerBtn: "பதிவு",
        haveAccount: "ஏற்கனவே பதிவு செய்தவரா?",
        loginLink: "உள்நுழைவு",
        error: "பிழை",
        success: "பதிவு முடிந்தது"
      }
    };

    const langSelect = document.getElementById("langSelect");
    const statusEl = document.getElementById("status");

    function applyTranslations(lang) {
      const dict = translations[lang] || translations.en;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[key]) {
          el.textContent = dict[key];
        }
      });
    }

    langSelect.addEventListener("change", (e) => applyTranslations(e.target.value));
    applyTranslations(langSelect.value);

    document.getElementById("registerBtn").addEventListener("click", async () => {
      statusEl.textContent = "";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) {
        statusEl.textContent = "Please enter email and password.";
        return;
      }
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = `${translations[langSelect.value]?.error || "Error"}: ${data.error || "Register failed"}`;
          return;
        }
        statusEl.textContent = translations[langSelect.value]?.success || "Registered";
        setTimeout(() => { window.location.href = "/login"; }, 700);
      } catch (err) {
        statusEl.textContent = "Register failed.";
      }
    });
  </script>
</body>
</html>
